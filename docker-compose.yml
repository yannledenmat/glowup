version: '3.8'

services:
  # Base de données PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: glowcommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glowcommerce
      POSTGRES_USER: glowcommerce_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - glowcommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowcommerce_app -d glowcommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  backend:
    build: ./glowcommerce-backend
    container_name: glowcommerce-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://database:5432/glowcommerce
      DB_USERNAME: glowcommerce_app
      DB_PASSWORD: ${DB_PASSWORD:-changeme123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8080:8080"
    networks:
      - glowcommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend React
  frontend:
    build: ./glowcommerce-frontend
    container_name: glowcommerce-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    networks:
      - glowcommerce-network

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: glowcommerce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - glowcommerce-network

  # Grafana (visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: glowcommerce-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - glowcommerce-network
    depends_on:
      - prometheus

  # Portainer (Docker management UI)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: glowcommerce-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - glowcommerce-network

  # pgAdmin (PostgreSQL web client)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: glowcommerce-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@glowcommerce.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - glowcommerce-network
    depends_on:
      database:
        condition: service_healthy

networks:
  glowcommerce-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  portainer_data:
  pgadmin_data:
